project:
  type: website
  resources:
    - assets/icons/**

lang: nl

language:
  listing-page-field-categories: "Onderwerpen"
  title-block-author-single: "Onderzoeker"
  title-block-author-plural: "Onderzoekers"
  title-block-affiliation-single: "Onderzoeker"
  title-block-affiliation-plural: "Onderzoekers"
  title-block-published: "Gepubliceerd op"
  title-block-modified: "Laatst bijgewerkt op"
  title-block-keywords: "Onderwerpen"

website:
  title: "UX onderzoeksrapportages"
  description: "Onderzoeksrapporten van gebruikersonderzoek bij de Rijksoverheid"
  repo-url: https://github.com/MinBZK/ux-onderzoeksrapportages
  repo-branch: main
  repo-actions: [edit]
  navbar:
    title: false
    background: primary
    pinned: true
    left:
      - href: index.qmd
        text: UX onderzoeksrapportages
      - href: rapporten.qmd
        text: Rapporten
      - href: handleiding.qmd
        text: Handleiding

format:
  html:
    theme: custom.scss
    toc: true
    toc-location: left
    format-links: false
    include-after-body:
      - text: |
          <script>
            const isRapport = /\/rapporten\//.test(location.pathname);
            const editBlock = document.querySelector('.quarto-edit-meta, .toc-actions');
            if (!isRapport && editBlock) {
              editBlock.remove();
            }
            if (isRapport) {
              const iconBase = '/assets/icons';
              const svg = (file, alt) => `<img src="${iconBase}/${file}" alt="" aria-hidden="true" class="toc-action-icon" width="16" height="16">`;
              // herlabel "Pagina bewerken" -> "Bewerk dit rapport"; vervang Bootstrap-icoon door SVG
              document.querySelectorAll('.toc-actions a.toc-action').forEach(a => {
                a.innerHTML = `${svg('logo-github.svg')} Bewerk dit rapport op GitHub`;
              });
              const pdfHref = location.pathname.replace('.html', '.pdf');
              const repoNew = 'https://github.com/MinBZK/ux-onderzoeksrapportages/new/main/rapporten';
              const extraItems = `
                <li><a href="${repoNew}" class="toc-action" target="_blank" rel="noopener">${svg('logo-github.svg')} Maak een nieuw rapport</a></li>
                <li><a href="${pdfHref}" class="toc-action">${svg('icon-filetype-pdf.svg')} Download als PDF</a></li>
              `;
              document.querySelectorAll('.toc-actions ul').forEach(ul => {
                ul.insertAdjacentHTML('beforeend', extraItems);
              });
            }
          </script>
    mermaid:
      theme: default
      themeVariables:
        primaryColor: "#01689b"
        primaryTextColor: "#fff"
        primaryBorderColor: "#01689b"
        lineColor: "#444"
        fontFamily: "RijksSansVF, sans-serif"
    lightbox: true
    include-in-header:
      - text: |
          <link rel="stylesheet" href="https://proef.moza.rijksapp.dev/style/_rijkshuisstijl.css">
          <link rel="stylesheet" href="https://proef.moza.rijksapp.dev/style/_toepassing.css">
          <link rel="stylesheet" href="https://proef.moza.rijksapp.dev/style/_reset.css">
          <link rel="shortcut icon" href="https://proef.moza.rijksapp.dev/assets/favicon/favicon.ico" type="image/x-icon">
          <link rel="icon" sizes="192x192" href="https://proef.moza.rijksapp.dev/assets/favicon/touch-icon.png">
          <link rel="apple-touch-icon" href="https://proef.moza.rijksapp.dev/assets/favicon/apple-touch-icon.png">
    include-before-body:
      - _includes/banner.html
    custom-callout:
      callout-quote:
        title: "Citaat"
        color: ""
        icon-symbol: "💬"
        collapse: false
      callout-question:
        title: "Vraag"
        color: ""
        icon-symbol: "🙋"
        collapse: false
      callout-usecase:
        title: "Use case"
        color: ""
        icon-symbol: "👤"
        collapse: false
      callout-userjourney:
        title: "Klantreis"
        color: ""
        icon-symbol: "✈️"
        collapse: false
      callout-requirement:
        title: "Voorwaarde"
        color: ""
        icon-symbol: "☑️"
        collapse: false
    filters:
      - custom-callout
  typst:
    toc: true
    toc-depth: 2
    papersize: a4
    margin:
      x: 2.5cm
      y: 2.5cm
    format-links: false

navbar:
  background: primary